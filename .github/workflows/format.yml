name: format

# Prettier is the formatter/linter of record for this repo. This gate fails any
# push or PR whose tracked files are not formatted to .prettierrc.json.
on:
  push:
    branches: [main]
  pull_request:

# Read-only: this job only checks formatting, it never writes back.
permissions: {}

concurrency:
  group: format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prettier:
    name: Prettier check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install pinned tooling
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund

      - name: Check formatting with Prettier
        run: |
          set -euo pipefail
          npm run format:check
